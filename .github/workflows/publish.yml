name: Publish NuGet

on:
  push:
    tags: ['*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build & Pack
        run: dotnet pack OpenHABRestClient/OpenHABRestClient.csproj --configuration Release --output nupkg

      - name: Push to NuGet
        run: dotnet nuget push nupkg/*.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate
